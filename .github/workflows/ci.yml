name: ScaleGuard CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            libhiredis-dev \
            libasio-dev

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja

      - name: Build
        run: |
          cmake --build build

      - name: Run Storage Tests
        run: |
          ./build/test_storage

      - name: Run Token Bucket Tests
        run: |
          ./build/test_token_bucket

      - name: Run Fixed Window Tests
        run: |
          ./build/test_fixed_window